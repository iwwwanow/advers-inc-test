services:
  mysql:
    image: mysql:8.4.8
    container_name: advers-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: advers
      MYSQL_USER: advers
      MYSQL_PASSWORD: advers
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "advers", "-padvers"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - advers-net

  mongo:
    image: mongo:7.0.31
    container_name: advers-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - advers-net

  app:
    image: geoffreybooth/meteor-base:3.4
    container_name: advers-app
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      MONGO_URL: mongodb://mongo:27017/advers
      ROOT_URL: http://localhost:3000
      PORT: 3000
      METEOR_ALLOW_SUPERUSER: "1"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: advers
      MYSQL_USER: advers
      MYSQL_PASSWORD: advers
    volumes:
      # Исходный код монтируется — изменения подхватываются без пересборки
      - .:/app
      # node_modules контейнера изолированы от хостовых (named volume)
      - app_node_modules:/app/node_modules
      # Кэш Meteor-пакетов — не скачивать заново при каждом рестарте
      - meteor_local:/app/.meteor/local
    command: sh -c "[ ! -d node_modules/meteor-node-stubs ] && (meteor npm cache clean --force; meteor npm install); meteor run --port 3000"
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - advers-net

networks:
  advers-net:
    driver: bridge

volumes:
  mysql_data:
  mongo_data:
  meteor_local:
  app_node_modules:
